<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Julia Vaganova | Bridal & Elegance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f4eee7; --paper:#fbf8f4; --ink:#1d1815; --muted:#6b625b; --line:rgba(29,24,21,0.12); --glow: rgba(255,255,255,0.72); --pearl: rgba(228, 219, 209, 0.66); }
    * { box-sizing:border-box; } body { margin:0; font-family:"Manrope",sans-serif; color:var(--ink); background:
      radial-gradient(circle at top right, var(--glow), transparent 24rem),
      radial-gradient(circle at 12% 24%, var(--pearl), transparent 26rem),
      linear-gradient(180deg,#f8f2ec 0%,#ede2d6 100%); }
    a { color:inherit; } .shell { width:min(1120px, calc(100vw - 32px)); margin:0 auto; padding:28px 0 56px; }
    .top { display:flex; justify-content:space-between; gap:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.14em; font-size:.8rem; margin-bottom:18px; }
    .hero { display:grid; grid-template-columns:1.05fr .95fr; gap:18px; margin-bottom:18px; }
    .panel, figure { border:1px solid var(--line); border-radius:30px; background:rgba(251,248,244,.74); overflow:hidden; box-shadow:0 20px 70px rgba(50,33,20,.08); backdrop-filter: blur(12px); }
    .panel { padding:30px; } .eyebrow { text-transform:uppercase; letter-spacing:.2em; font-size:.75rem; color:var(--muted); margin-bottom:10px; }
    h1, h2 { font-family:"Cormorant Garamond",serif; margin:0; } h1 { font-size:clamp(3.3rem,7vw,6rem); line-height:.9; margin-bottom:12px; }
    p { color:var(--muted); line-height:1.8; margin:0; } .hero img, .grid img { width:100%; height:100%; object-fit:cover; display:block; }
    .meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; } .pill { padding:9px 12px; border-radius:999px; background:rgba(255,255,255,.8); border:1px solid var(--line); font-size:.82rem; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; } figure { margin:0; } figcaption { padding:12px 14px 16px; color:var(--muted); font-size:.92rem; background:linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0.55)); }
    .actions { margin-top:18px; display:flex; gap:12px; flex-wrap:wrap; } .button { display:inline-flex; min-height:46px; align-items:center; justify-content:center; padding:0 16px; border-radius:999px; text-decoration:none; font-weight:700; font-size:.92rem; }
    .primary { background:var(--ink); color:#fff; } .secondary { border:1px solid var(--line); background:#fff; }
    @media (max-width:900px) { .hero, .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="shell">
    <div class="top"><div>Julia Vaganova</div><div>Bridal & Elegance</div></div>
    <section class="hero">
      <div class="panel">
        <div class="eyebrow">Portfolio Category</div>
        <h1>Bridal & elegance.</h1>
        <p>This edit pulls the softer, more refined side of Julia’s book: bridal beauty, white styling, polished romance, and cleaner occasion-driven imagery.</p>
        <div class="meta"><div class="pill">bridal</div><div class="pill">white styling</div><div class="pill">refined</div><div class="pill">soft luxury</div></div>
        <div class="actions">
          <a class="button primary" href="https://www.instagram.com/julia_mod8/">Book via Instagram</a>
          <a class="button secondary" href="index.html">Back to Portal</a>
        </div>
      </div>
      <figure><img src="assets/white-halter-beauty.jpg" alt="Julia in white halter look"><figcaption>Clean bridal beauty / elegant profile</figcaption></figure>
    </section>
    <section class="grid">
      <figure><img src="assets/beach-bw.jpg" alt="Julia in white on the beach"><figcaption>Romantic atmosphere / destination-friendly mood</figcaption></figure>
      <figure><img src="assets/colonnade-coat.jpg" alt="Julia in an elegant colonnade setting"><figcaption>Formal elegance / elevated setting</figcaption></figure>
      <figure><img src="assets/pearl-bw.jpg" alt="Julia black and white pearl portrait"><figcaption>Classic beauty / simple luxury</figcaption></figure>
      <figure><img src="assets/soft-balcony.jpg" alt="Julia on a balcony"><figcaption>Softer femininity / quiet glamour</figcaption></figure>
    </section>
  </main>
</body>
</html>
